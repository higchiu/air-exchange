<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<title>Air Exchange Panel Background 480x480</title>
<style>
  html, body { margin: 0; padding: 0; }
  body {
    width: 480px;
    height: 480px;
    overflow: hidden;
    background:
      radial-gradient(120% 80% at 50% 110%, #f1f6ff 0%, #dbe8fb 35%, #c6dafa 70%, #b8d0f7 100%);
  }
  .stage {
    position: relative;
    width: 480px;
    height: 480px;
    overflow: hidden;
  }
  svg.house {
    position: absolute;
    /*
      Smaller house, bleeds slightly off LEFT.
      Visible house area: x ≈ 0..340, y ≈ 70..390
      Clear zone on right (for 室外 panel): x ≈ 340..480 (~140 px wide)
    */
    left: -60px;
    top: 70px;
  }
</style>
</head>
<body>
  <div class="stage">
    <svg class="house" width="400" height="320" viewBox="0 0 400 320"
         xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="glassFill" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.70"/>
          <stop offset="55%"  stop-color="#ffffff" stop-opacity="0.42"/>
          <stop offset="100%" stop-color="#ffffff" stop-opacity="0.20"/>
        </linearGradient>
        <linearGradient id="glassEdge" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.95"/>
          <stop offset="40%"  stop-color="#ffffff" stop-opacity="0.35"/>
          <stop offset="100%" stop-color="#ffffff" stop-opacity="0.10"/>
        </linearGradient>
        <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
          <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
          <feOffset dx="0" dy="8" result="off"/>
          <feComponentTransfer><feFuncA type="linear" slope="0.22"/></feComponentTransfer>
          <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- Rounded pentagon (r = 16) -->
      <path
        d="M 185.15 5.94
           Q 200 0 214.85 5.94
           L 385.15 74.06
           Q 400 80 400 96
           L 400 304
           Q 400 320 384 320
           L 16 320
           Q 0 320 0 304
           L 0 96
           Q 0 80 14.85 74.06
           Z"
        fill="url(#glassFill)"
        stroke="url(#glassEdge)"
        stroke-width="1.2"
        filter="url(#softShadow)" />
    </svg>
  </div>
</body>
</html>

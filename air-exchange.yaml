# 主配置：先 include 引脚 substitutions，再挂硬件包与外设 packages
# 硬件包路径按你本机 esphome-modular-lvgl-buttons 位置修改

substitutions:
  mcp_valves_address: "0x21"   # V3→0x21  V4→可改 0x20
  valve_home_mode: "stall"      # stall | manual | limit（无限位用 stall）
  icon_font: mdi_icons_40
  text_font: nunito_20
  screen_width: "480"
  screen_height: "480"

esphome:
  name: air-exchange
  friendly_name: "热交换新风机"
  min_version: 2025.1.0

logger:

# 联网（复制 secrets.yaml.example → secrets.yaml）
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Air-Exchange Fallback"
    password: !secret wifi_password

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

packages:
  device_pins: !include packages/pinmap.yaml
  # A) 无屏调试：保留 hardware_bus
  hardware_bus: !include packages/hardware_bus.yaml

  # B) 触摸屏：注释 A，改挂 modular-lvgl（V3/V4 二选一，见 README 附录）
  # hardware: !include esphome-modular-lvgl-buttons/hardware/waveshare-esp32-s3-touch-lcd-4-v4.yaml

  sensors_pkg: !include packages/sensors.yaml
  fan_pkg: !include packages/fan.yaml
  actuators_pkg: !include packages/actuators.yaml
  interlock_pkg: !include packages/erv_interlock.yaml
  city_pm25_pkg: !include packages/city_pm25.yaml

  # wifi/theme/lvgl 等按需从 modular-lvgl-buttons 追加

# 带 LVGL 触控屏的完整配置（Waveshare 4" 480×480）
# 用法：
#   1. 使用本仓库 vendor/esphome-modular-lvgl-buttons，或克隆到同级并改 lvgl_lib
#   2. esphome run air-exchange-display.yaml
#
# 无屏调试请用 air-exchange.yaml

substitutions:
  # 与根目录 esphome-modular-lvgl-buttons 符号链接一致（主题字体路径依赖此目录名）
  lvgl_lib: "esphome-modular-lvgl-buttons"
  board_hw: "waveshare-esp32-s3-touch-lcd-4-v4"   # V3 改为 waveshare-esp32-s3-touch-lcd-4
  mcp_valves_address: "0x20"   # V3 改为 0x21
  valve_home_mode: "stall"
  icon_font: mdi_icons_40
  text_font: nunito_20
  button_on_color: "ep_orange"
  button_off_color: "very_dark_gray"
  icon_on_color: "yellow"
  icon_off_color: "gray"
  label_on_color: "white"
  label_off_color: "gray"
  screen_width: "480"
  screen_height: "480"
  display_daytime_brightness: "100%"
  display_nighttime_brightness: "40%"
  display_night_hour: "22"
  display_night_minute: "0"
  display_backlight_timeout_always_enabled: "false"
  display_backlight_timeout_initial: "5"

esphome:
  name: air-exchange
  friendly_name: "热交换新风机"
  min_version: 2025.12.0
  project:
    name: "air-exchange.display"
    version: "0.2.0"
  on_boot:
    - priority: 400
      then:
        - script.execute: update_loading_page

logger:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Air-Exchange Fallback"
    password: !secret wifi_password

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

external_components:
  - source: github://pr#10071
    components: [waveshare_io_ch32v003]
    refresh: 1h

packages:
  device_pins: !include packages/pinmap.yaml
  theme: !include esphome-modular-lvgl-buttons/common/theme/index.yaml
  time: !include esphome-modular-lvgl-buttons/common/time_sntp.yaml
  sensors_base: !include esphome-modular-lvgl-buttons/common/sensors_base.yaml
  backlight: !include esphome-modular-lvgl-buttons/common/backlight_time.yaml
  ota_screen: !include esphome-modular-lvgl-buttons/common/ota.yaml
  loading_screen: !include esphome-modular-lvgl-buttons/pages/loading.yaml
  info_screen: !include esphome-modular-lvgl-buttons/pages/info.yaml
  hardware: !include esphome-modular-lvgl-buttons/hardware/waveshare-esp32-s3-touch-lcd-4-v4.yaml

  display_ui: !include packages/display_ui.yaml
  main_page_assets: !include packages/main_page_assets.yaml
  main_page_logic: !include packages/main_page_logic.yaml
  main_page_ui: !include packages/main_page_ui.yaml

  sensors_pkg: !include packages/sensors.yaml
  fan_pkg: !include packages/fan.yaml
  actuators_pkg: !include packages/actuators.yaml
  interlock_pkg: !include packages/erv_interlock.yaml
  city_pm25_pkg: !include packages/city_pm25.yaml
  tvoc_pkg: !include packages/tvoc_sensor.yaml

  # ── 副页：送风/排风调节（左右滑回 main_page）──
  ui_fan_supply_down: !include
    file: esphome-modular-lvgl-buttons/ui/button/local.yaml
    vars:
      uid: ui_fan_supply_down
      entity_id: btn_fan_supply_down
      row: 0
      column: 0
      page_id: ctrl_page
      text: "Sup -"
      icon: $mdi_fan_minus

  ui_fan_supply_up: !include
    file: esphome-modular-lvgl-buttons/ui/button/local.yaml
    vars:
      uid: ui_fan_supply_up
      entity_id: btn_fan_supply_up
      row: 0
      column: 1
      page_id: ctrl_page
      text: "Sup +"
      icon: $mdi_fan_plus

  ui_fan_exhaust_down: !include
    file: esphome-modular-lvgl-buttons/ui/button/local.yaml
    vars:
      uid: ui_fan_exhaust_down
      entity_id: btn_fan_exhaust_down
      row: 1
      column: 0
      page_id: ctrl_page
      text: "Exh -"
      icon: $mdi_fan_minus

  ui_fan_exhaust_up: !include
    file: esphome-modular-lvgl-buttons/ui/button/local.yaml
    vars:
      uid: ui_fan_exhaust_up
      entity_id: btn_fan_exhaust_up
      row: 1
      column: 1
      page_id: ctrl_page
      text: "Exh +"
      icon: $mdi_fan_plus

  ui_goto_main: !include
    file: esphome-modular-lvgl-buttons/ui/page/page_button.yaml
    vars:
      uid: ui_goto_main
      row: 0
      column: 2
      page_id: ctrl_page
      text: "Back"
      icon: $mdi_chevron_left
      click_page: main_page

  ui_info: !include
    file: esphome-modular-lvgl-buttons/ui/page/page_button.yaml
    vars:
      uid: ui_info
      row: 1
      column: 2
      page_id: ctrl_page
      text: "Info"
      icon: $mdi_information_box
      click_page: info_screen

lvgl:
  buffer_size: 100%

font:
  - file: "https://github.com/Templarian/MaterialDesign-Webfont/raw/v7.4.47/fonts/materialdesignicons-webfont.ttf"
    id: mdi_icons_40
    size: 40
    bpp: 8
    glyphs:
      - $mdi_wifi
      - $mdi_wifi_off
      - $mdi_wifi_strength_1
      - $mdi_wifi_strength_2
      - $mdi_wifi_strength_3
      - $mdi_wifi_strength_4
      - $mdi_thermometer
      - $mdi_water_percent
      - $mdi_fan
      - $mdi_fan_plus
      - $mdi_fan_minus
      - $mdi_chevron_left
      - $mdi_information_box

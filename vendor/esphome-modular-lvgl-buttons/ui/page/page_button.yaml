---
# Change page button
# Short click opens page_id page
#
# vars:
#   uid:          unique identifier
#   row:          grid row
#   column:       grid column
#   text:         tile label
#   icon:         icon glyph (required — e.g. $mdi_page_next or $mdi_page_previous)
#   row_span:     (default: 1)
#   column_span:  (default: 1)
#   page_id:      parent page (default: main_page)
#   click_page:   destination page name (default: main_page)

# This section adds a button to an LVGL page
lvgl:
  pages:
    - id: !extend ${page_id | default("main_page")}
      widgets:
        - container:
            id: ${uid}
            grid_cell_row_pos: ${row}
            grid_cell_column_pos: ${column}
            grid_cell_row_span: ${row_span | default(1)}
            grid_cell_column_span: ${column_span | default(1)}
            grid_cell_x_align: stretch
            grid_cell_y_align: stretch
            # outline_width: 1
            # outline_color: red
            widgets:
            - button:
                id: button_${uid}
                widgets:
                  - label:
                      text_font: $icon_font
                      align: top_left
                      id: icon_${uid}
                      text_color: $label_off_color
                      text: ${icon}
                  - label:
                      align: bottom_left
                      id: label_${uid}
                      text_color: $label_off_color
                      text: ${text}
                on_short_click:
                    then:
                      lvgl.page.show: ${click_page | default("main_page")}

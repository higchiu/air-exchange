# 最小硬件：仅 ESP32-S3 + I2C bus_a（无触摸屏）
# Guition 4848S040：SDA=GPIO19 SCL=GPIO45（与带屏 hardware 包一致）
# 使用 LVGL 屏时：在 air-exchange-display.yaml 中挂 guition-esp32-s3-4848s040 hardware 包，并注释本文件

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

i2c:
  - id: bus_a
    sda: GPIO19
    scl: GPIO45
    scan: true
    frequency: 100kHz
    timeout: 10ms

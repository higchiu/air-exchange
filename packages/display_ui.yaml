# LVGL 页面：main_page 使用 bg.png 自定义布局（见 packages/main_page_*.yaml）
# 副页 ctrl_page 仍为网格按钮

substitutions:
  ui_page_layout: "4x4"

lvgl:
  pages:
    - id: main_page
      layout: NONE
      styles: page_style
      <<: !include ../esphome-modular-lvgl-buttons/common/swipe_navigation.yaml

    - id: ctrl_page
      layout: 3x2
      styles: page_style
      <<: !include ../esphome-modular-lvgl-buttons/common/swipe_navigation.yaml
      widgets:
        - label:
            align: top_mid
            y: 4
            text_font: $text_font
            text_color: $label_on_color
            text: "送风 / 排风"

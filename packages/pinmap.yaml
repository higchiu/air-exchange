# 风机 CLK/FG、PMS UART（air-exchange.yaml / air-exchange-display.yaml 共用）
# 目标板：Guition ESP32-S3-4848S040（整机）
# 48F704P400：GPIO PWM → 蓝 CLK；GPIO ← 橙 FG

substitutions:
  fan_supply_pwm_pin: "GPIO35"
  fan_supply_tach_pin: "GPIO36"
  fan_exhaust_pwm_pin: "GPIO37"
  fan_exhaust_tach_pin: "GPIO33"
  fan_supply_default_speed: "70"
  fan_exhaust_default_speed: "50"
  # 板载 UART 座：U0TX=GPIO43 → 接 PMS TX；U0RX=GPIO44 → 接 PMS RX
  uart_pms_tx_pin: "GPIO44"
  uart_pms_rx_pin: "GPIO43"

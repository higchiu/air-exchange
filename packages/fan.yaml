# 送风 fan_supply、排风 fan_exhaust：LEDC PWM → CLK，pulse_counter ← FG
# 实机 Nidec 48F704P400：红 24V / 黑 GND / 蓝 CLK / 橙 FG（BRK、5V 不接）

output:
  - platform: ledc
    pin: ${fan_supply_pwm_pin}
    id: fan_supply_pwm_out
    frequency: 25 kHz
    channel: 0

  - platform: ledc
    pin: ${fan_exhaust_pwm_pin}
    id: fan_exhaust_pwm_out
    frequency: 25 kHz
    channel: 2

fan:
  - platform: speed
    output: fan_supply_pwm_out
    id: fan_supply
    name: "erv_fan_supply"
    speed_count: 100

  - platform: speed
    output: fan_exhaust_pwm_out
    id: fan_exhaust
    name: "erv_fan_exhaust"
    speed_count: 100

sensor:
  - platform: pulse_counter
    pin:
      number: ${fan_supply_tach_pin}
      mode:
        input: true
        pullup: true
    name: "erv_fan_supply_tach"
    id: fan_supply_tach
    internal: true

  - platform: pulse_counter
    pin:
      number: ${fan_exhaust_tach_pin}
      mode:
        input: true
        pullup: true
    name: "erv_fan_exhaust_tach"
    id: fan_exhaust_tach
    internal: true

number:
  - platform: template
    name: "fan_supply_speed_pct"
    id: num_fan_supply_speed
    optimistic: true
    restore_value: true
    initial_value: ${fan_supply_default_speed}
    min_value: 0
    max_value: 100
    step: 1
    mode: slider
    unit_of_measurement: "%"
    set_action:
      - if:
          condition:
            lambda: "return (int)x == 0;"
          then:
            - fan.turn_off: fan_supply
          else:
            - fan.turn_on:
                id: fan_supply
                speed: !lambda "return (int)x;"

  - platform: template
    name: "fan_exhaust_speed_pct"
    id: num_fan_exhaust_speed
    optimistic: true
    restore_value: true
    initial_value: ${fan_exhaust_default_speed}
    min_value: 0
    max_value: 100
    step: 1
    mode: slider
    unit_of_measurement: "%"
    set_action:
      - if:
          condition:
            lambda: "return (int)x == 0;"
          then:
            - fan.turn_off: fan_exhaust
          else:
            - fan.turn_on:
                id: fan_exhaust
                speed: !lambda "return (int)x;"

script:
  - id: fans_apply_configured_speeds
    then:
      - if:
          condition:
            lambda: "return id(num_fan_supply_speed).state == 0;"
          then:
            - fan.turn_off: fan_supply
          else:
            - fan.turn_on:
                id: fan_supply
                speed: !lambda "return (int)id(num_fan_supply_speed).state;"
      - if:
          condition:
            lambda: "return id(num_fan_exhaust_speed).state == 0;"
          then:
            - fan.turn_off: fan_exhaust
          else:
            - fan.turn_on:
                id: fan_exhaust
                speed: !lambda "return (int)id(num_fan_exhaust_speed).state;"

  - id: fans_turn_off
    then:
      - fan.turn_off: fan_supply
      - fan.turn_off: fan_exhaust

  - id: fan_supply_speed_up
    then:
      - lambda: |-
          int v = (int) id(num_fan_supply_speed).state + 10;
          if (v > 100) v = 100;
          id(num_fan_supply_speed).publish_state(v);
      - script.execute: fans_apply_configured_speeds

  - id: fan_supply_speed_down
    then:
      - lambda: |-
          int v = (int) id(num_fan_supply_speed).state - 10;
          if (v < 0) v = 0;
          id(num_fan_supply_speed).publish_state(v);
      - script.execute: fans_apply_configured_speeds

  - id: fan_exhaust_speed_up
    then:
      - lambda: |-
          int v = (int) id(num_fan_exhaust_speed).state + 10;
          if (v > 100) v = 100;
          id(num_fan_exhaust_speed).publish_state(v);
      - script.execute: fans_apply_configured_speeds

  - id: fan_exhaust_speed_down
    then:
      - lambda: |-
          int v = (int) id(num_fan_exhaust_speed).state - 10;
          if (v < 0) v = 0;
          id(num_fan_exhaust_speed).publish_state(v);
      - script.execute: fans_apply_configured_speeds

button:
  - platform: template
    name: "fan_supply_speed_up"
    id: btn_fan_supply_up
    internal: true
    on_press:
      - script.execute: fan_supply_speed_up

  - platform: template
    name: "fan_supply_speed_down"
    id: btn_fan_supply_down
    internal: true
    on_press:
      - script.execute: fan_supply_speed_down

  - platform: template
    name: "fan_exhaust_speed_up"
    id: btn_fan_exhaust_up
    internal: true
    on_press:
      - script.execute: fan_exhaust_speed_up

  - platform: template
    name: "fan_exhaust_speed_down"
    id: btn_fan_exhaust_down
    internal: true
    on_press:
      - script.execute: fan_exhaust_speed_down
